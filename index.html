<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #0f172a;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      width: min(90%, 700px);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.6;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>My Website is Live 🚀</h1>
    <p>This is my starter site.</p>
    <p>I’ll redesign this later.</p>
  </main>
</body>
</html>
